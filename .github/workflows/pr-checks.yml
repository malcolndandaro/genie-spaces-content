name: pr-checks

# S9b (app-ux-overhaul repo split): this workflow lives in the CONTENT repo
# (genie-spaces-content) because GitHub Actions only fires on events in the repo that CONTAINS
# the workflow file (RS2). But the pipeline LOGIC (render.sh, check_audience.py, check_eval*.py,
# databricks.yml, tests) lives in the app repo (genie-promote-cicd) and is NOT duplicated here —
# each job checks out the app repo and OVERLAYS this repo's promotable content (src/) into it, so
# the unchanged engine scripts run exactly as they did pre-split.
#
# SCOPE (found live 2026-07-16): the governance gates (AUDIENCE-01, EVAL-01, eval-run) check ONLY the
# spaces this PR actually changes — computed from `git diff` against the PR base. Otherwise a PR
# touching only the workflow/an unrelated space would be blocked by LEGACY content already on main
# (e.g. a space promoted before a gate existed). A PR that changes no serialized_space file (docs,
# workflow) runs the gates over an empty set — they pass trivially.
on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

env:
  DATABRICKS_BUNDLE_ENGINE: direct
  # The app (engine + scripts + databricks.yml) repo the pipeline logic is checked out from.
  APP_REPO: malcolndandaro/genie-promote-cicd

jobs:
  validate:
    name: bundle validate (prod)
    runs-on: self-hosted   # workspace IP-ACL blocks hosted runners
    if: vars.DATABRICKS_PROD_HOST != ''
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_PROD_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_PROD_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_PROD_SP_SECRET }}
    steps:
      # 1. The content repo = the PR under test. fetch-depth: 0 so we can diff against the PR base
      #    to find which spaces changed (scope the gates to them).
      - name: Checkout content (this PR)
        uses: actions/checkout@v4
        with:
          path: content
          fetch-depth: 0
      - name: Resolve immutable engine revision
        id: engine
        run: |
          sha="$(tr -d '[:space:]' < content/engine.lock)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::engine.lock must contain one full commit SHA"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Resolved immutable engine revision: $sha"
      # 2. The app repo = engine + pipeline logic at the exact reviewed lock.
      - name: Checkout app repo (locked pipeline logic)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          ref: ${{ steps.engine.outputs.sha }}
          path: app
      # Never inherit the self-hosted machine's ambient Python. Homebrew Python is PEP 668 managed
      # and rejects the pip installs below; pinning also keeps both jobs on the same tested runtime.
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      # 3. Overlay this PR's content into the app-repo working tree, so render.sh finds src/genie/*
      #    where it expects. --delete so a removed content file doesn't linger from the app checkout.
      - name: Overlay content src/ into the app working tree
        run: rsync -a --delete content/src/ app/src/
      - name: Report immutable content + engine revisions
        id: revision
        run: |
          content_revision="$(python3 app/scripts/content_revision.py app)"
          echo "content=$content_revision" >> "$GITHUB_OUTPUT"
          echo "::notice title=Immutable revision pair::content=$content_revision engine=${{ steps.engine.outputs.sha }}"
      # 4. Any contract file can change behavior; map all of them back to the owning Space slug.
      - name: Compute changed space slugs
        id: changed
        run: |
          slugs="$(git -C content diff --name-only '${{ github.event.pull_request.base.sha }}' HEAD \
                    -- 'src/genie/*' | python3 app/scripts/changed_space_slugs.py)"
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"
          echo "Changed space slugs: ${slugs:-(none)}"
      - uses: databricks/setup-cli@main
        with:
          version: 1.4.0
      - name: Unit tests (engine + engine API)
        working-directory: app
        run: |
          python3 -m pip install -q 'databricks-sdk>=0.111.0' fastapi uvicorn httpx pytest
          python3 -m pytest tests/ -q
      - name: Pre-render + identifier allowlist (rejects foreign-env / cross-domain refs)
        working-directory: app
        run: bash scripts/render.sh prod
      - name: Stub the app source dir (ADR-0006/A1 — promote_app now targets prod)
        working-directory: app
        run: |
          mkdir -p build/promote_app
          touch build/promote_app/validation.stub
      - name: Validate bundle (prod target)
        working-directory: app
        run: databricks bundle validate --strict -t prod --var "warehouse_id=${{ vars.DATABRICKS_PROD_WAREHOUSE_ID }}"
      - name: AUDIENCE-01 + EVAL-01 (governance gates, only changed Spaces)
        working-directory: app
        run: |
          python3 -m pip install -q 'databricks-sdk>=0.111.0'
          for slug in ${{ steps.changed.outputs.slugs }}; do
            f="build/genie/${slug}.serialized_space.json"
            [ -f "$f" ] || { echo "skip ${slug}: no rendered artifact"; continue; }
            python3 scripts/check_audience.py "$f" "build/genie/${slug}.audience.json"
            python3 scripts/check_eval.py "$f"
          done

  # The eval-run PASS-RATE gate (blocks the merge on a below-threshold score). Its own job because it
  # authenticates to the DEV workspace (the live space with the benchmarks) as the dev-reader SP —
  # distinct auth from the prod-SP `validate` job above. Both jobs are required checks under branch
  # protection, so either failing blocks the merge. Only the spaces this PR changed are eval-run.
  eval-run:
    name: eval-run pass-rate (dev)
    runs-on: self-hosted   # workspace IP-ACL blocks hosted runners
    if: vars.DATABRICKS_DEV_HOST != '' && vars.DATABRICKS_DEV_SP_CLIENT_ID != ''
    env:
      # Targets DEV, as the dev-reader SP (oauth-m2m) — the space being promoted is live in dev.
      DATABRICKS_HOST: ${{ vars.DATABRICKS_DEV_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_DEV_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_DEV_SP_SECRET }}
      # The pinned-slug map so check_eval_run can recover the dev space id from a pinned slug (must
      # match the app's APP_SPACE_SLUGS baked in build_promote_app.sh).
      APP_SPACE_SLUGS: '{"01f16e8322661161a83f7d1f2a1bec14": "receivables"}'
    steps:
      - name: Checkout content (this PR)
        uses: actions/checkout@v4
        with:
          path: content
          fetch-depth: 0
      - name: Resolve immutable engine revision
        id: engine
        run: |
          sha="$(tr -d '[:space:]' < content/engine.lock)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::engine.lock must contain one full commit SHA"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "Resolved immutable engine revision: $sha"
      - name: Checkout app repo (locked pipeline logic)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          ref: ${{ steps.engine.outputs.sha }}
          path: app
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.12'
      - name: Overlay content src/ into the app working tree
        run: rsync -a --delete content/src/ app/src/
      - name: Report immutable content + engine revisions
        id: revision
        run: |
          content_revision="$(python3 app/scripts/content_revision.py app)"
          echo "content=$content_revision" >> "$GITHUB_OUTPUT"
          echo "::notice title=Immutable revision pair::content=$content_revision engine=${{ steps.engine.outputs.sha }}"
      - name: Compute changed space slugs
        id: changed
        run: |
          slugs="$(git -C content diff --name-only '${{ github.event.pull_request.base.sha }}' HEAD \
                    -- 'src/genie/*' | python3 app/scripts/changed_space_slugs.py)"
          echo "slugs=$slugs" >> "$GITHUB_OUTPUT"
          echo "Changed space slugs: ${slugs:-(none)}"
      - uses: databricks/setup-cli@main
        with:
          version: 1.4.0
      - name: Pre-render serialized_space (dev_->prod_) + slug files
        working-directory: app
        run: bash scripts/render.sh prod
      - name: EVAL-RUN — Genie re-runs the benchmarks; pass-rate must clear the threshold
        working-directory: app
        run: |
          python3 -m pip install -q 'databricks-sdk>=0.111.0'
          for slug in ${{ steps.changed.outputs.slugs }}; do
            f="build/genie/${slug}.serialized_space.json"
            [ -f "$f" ] || { echo "skip ${slug}: no rendered artifact"; continue; }
            python3 scripts/check_eval_run.py "$f"
          done
