name: deploy

# S9b (app-ux-overhaul repo split): PR-merge -> prod promotion, running in the CONTENT repo
# (genie-spaces-content) where the promotion PRs now merge. Same checkout+overlay preamble as
# pr-checks.yml — the pipeline logic (render.sh, build_promote_app.sh, apply_access.py, the
# bundle) lives in the app repo and is checked out here, then this repo's src/ is overlaid on top.
# Behavior is byte-identical to the app repo's old deploy.yml (the prod Environment gate, the
# per-space render, the governed apply_access + app-SP grant) — only the source of `src/` moved.
#
# runs-on: self-hosted because both workspaces enforce IP access lists (see the app repo's
# SETUP.md). A second cerc-mac runner is registered on THIS repo for that (S9b — personal account,
# so per-repo runners, no org-level runner group).
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # never kill an approved, mid-deploy run

env:
  DATABRICKS_BUNDLE_ENGINE: direct
  APP_REPO: malcolndandaro/genie-promote-cicd

jobs:
  deploy-prod:
    name: Promote to prod (Steward approval)
    runs-on: self-hosted
    if: vars.DATABRICKS_PROD_HOST != ''
    environment: prod   # required-reviewer gate — pauses for the Steward's approval (SoD, ADR-0002)
    env:
      DATABRICKS_HOST: ${{ vars.DATABRICKS_PROD_HOST }}
      DATABRICKS_AUTH_TYPE: oauth-m2m
      DATABRICKS_CLIENT_ID: ${{ vars.DATABRICKS_PROD_SP_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_PROD_SP_SECRET }}
      BUNDLE_DEV_HOST: ${{ vars.DATABRICKS_DEV_HOST }}
      BUNDLE_DEV_WAREHOUSE_ID: ${{ vars.DATABRICKS_DEV_WAREHOUSE_ID }}
    steps:
      - name: Checkout content (merged main)
        uses: actions/checkout@v4
        with:
          path: content
      - name: Checkout prior content for desired-set reconciliation
        if: github.event.before != '0000000000000000000000000000000000000000'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.before }}
          path: previous-content
      - name: Resolve immutable engine revision
        id: engine
        run: |
          sha="$(tr -d '[:space:]' < content/engine.lock)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]] || { echo "::error::engine.lock must contain one full commit SHA"; exit 1; }
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "::notice title=Immutable revision pair::content=${GITHUB_SHA} engine=$sha"
      - name: Checkout app repo (locked pipeline logic)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.APP_REPO }}
          ref: ${{ steps.engine.outputs.sha }}
          path: app
      - name: Overlay content src/ into the app working tree
        run: rsync -a --delete content/src/ app/src/
      - uses: databricks/setup-cli@main
        with:
          version: 1.4.0
      - name: Safe staged deployment (preflight + forward-only reconciliation)
        id: deployment
        working-directory: app
        env:
          ENGINE_REVISION: ${{ steps.engine.outputs.sha }}
        run: |
          python3 -m pip install -q 'databricks-sdk>=0.111.0'
          python3 scripts/deploy_attempt.py \
            --warehouse-id "${{ vars.DATABRICKS_PROD_WAREHOUSE_ID }}" \
            --previous-content-root "$GITHUB_WORKSPACE/previous-content"
